# fund.imak.top —— fund-dashboard 静态站（方案 C：非标端口 + Cloudflare Origin Rules）
#
# 拓扑：访客 --443--> Cloudflare 橙云 --回源 8443(https)--> 本机 nginx --> web/ 静态文件
# 关键点：nginx 不占 80/443，只监听 8443；由 CF 的 Origin Rules 把回源端口改写成 8443，
#        所以访客 URL 里【不用带端口】。SSL/TLS 模式用 Full (strict) + CF Origin Certificate。
#
# 放到：/etc/nginx/conf.d/fund.imak.top.conf
# 证书：见 DEPLOY-VPS.md 第 2 步

server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    http2 on;
    server_name funds.imak.top;

    # Cloudflare Origin Certificate（15 年有效；仅 CF <-> 本机之间信任，不是公共 CA）
    ssl_certificate /etc/ssl/certs/cloudflare.crt;
    ssl_certificate_key /etc/ssl/private/cloudflare.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # 还原真实访客 IP（可选，日志里能看到真 IP 而不是 CF 的 IP）
    # include /etc/nginx/cloudflare-realip.conf;

    root  /var/www/funds/web;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # 数据每周才更新一次，短缓存即可；纯静态资源长缓存
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location ~* \.(json|md)$ {
        add_header Cache-Control "public, max-age=300";
    }
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?)$ {
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types application/json application/javascript text/css text/plain image/svg+xml;
}
