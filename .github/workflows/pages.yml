name: Deploy dashboard to GitHub Pages

# 每次 push 到 main（包含 run_weekly.sh 刷新后提交的 web/data）自动发布；也可手动触发
on:
  push:
    branches: [main]
    # 纯文档/配置改动不触发部署（注意不排除 web/data 下的 changes.md，那是站点内容）
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - '.gitattributes'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时刻只跑一个部署，排队不打断进行中的发布
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: 上传站点目录 web/
        uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - name: 部署到 Pages
        id: deployment
        uses: actions/deploy-pages@v4
